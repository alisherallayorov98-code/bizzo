name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  backend-test:
    name: Backend (unit + e2e)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: erp_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: erp_platform_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://erp_user:test_password@localhost:5432/erp_platform_test
      JWT_SECRET: test_jwt_secret_minimum_32_chars_long_ok
      JWT_REFRESH_SECRET: test_refresh_secret_minimum_32_chars_ok
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install deps
        working-directory: backend
        run: npm ci
      - name: Prisma generate
        working-directory: backend
        run: npx prisma generate
      - name: Prisma migrate deploy
        working-directory: backend
        run: npx prisma migrate deploy
      - name: Run tests with coverage
        working-directory: backend
        run: npx jest --coverage --ci
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
          retention-days: 7

  frontend-test:
    name: Frontend (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Run tests with coverage
        working-directory: frontend
        run: npm run test:cov
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          retention-days: 7

  e2e-test:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: erp_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: erp_platform_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://erp_user:test_password@localhost:5432/erp_platform_test
      JWT_SECRET: test_jwt_secret_minimum_32_chars_long_ok
      JWT_REFRESH_SECRET: test_refresh_secret_minimum_32_chars_ok
      NODE_ENV: test
      E2E_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install backend
        working-directory: backend
        run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy
          npx ts-node prisma/seed.ts
          npx ts-node prisma/seed-plans.ts
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Install Playwright browsers
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Start backend
        working-directory: backend
        run: npm run start &
      - name: Start frontend preview
        working-directory: frontend
        run: npm run preview -- --port 3000 &
      - name: Wait for servers
        run: npx wait-on http://localhost:4000/api/v1/health http://localhost:3000 --timeout 60000
      - name: Run Playwright
        working-directory: e2e
        run: npx playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
