name: Health Check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        id: ping
        run: |
          code=$(curl -s -o /tmp/body -w "%{http_code}" https://bizzo.uz/health || echo "000")
          echo "code=$code" >> "$GITHUB_OUTPUT"
          cat /tmp/body || true
          [ "$code" = "200" ] || exit 1

      - name: Telegram alert on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.DEPLOY_TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.DEPLOY_TELEGRAM_CHAT_ID }}" \
            -d text="Bizzo health check FAILED (HTTP ${{ steps.ping.outputs.code }}) — https://bizzo.uz/health"
