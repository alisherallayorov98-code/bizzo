# ============================================================
# Bizzo Production Nginx — SSL reverse proxy
# ============================================================

# Rate limit zones
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

# Upstream
upstream backend_upstream {
    server backend:4000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream frontend_upstream {
    server frontend:80 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# HTTP — redirect to HTTPS + ACME challenge
server {
    listen 80;
    server_name bizzo.uz www.bizzo.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name bizzo.uz www.bizzo.uz;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/bizzo.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bizzo.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Limits
    client_max_body_size 50M;
    limit_conn conn_zone 20;

    server_tokens off;

    # Auth endpoints — strict rate limit
    location ~ ^/api/v1/auth/(login|register) {
        limit_req zone=auth_zone burst=3 nodelay;
        proxy_pass http://backend_upstream;
        include /etc/nginx/conf.d/proxy-params.conf;
    }

    # API
    location /api {
        limit_req zone=api_zone burst=50 nodelay;
        proxy_pass http://backend_upstream;
        include /etc/nginx/conf.d/proxy-params.conf;
    }

    # WebSocket
    location /socket.io {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Health (no rate limit)
    location /health {
        proxy_pass http://backend_upstream/health;
        access_log off;
    }

    # Frontend
    location / {
        proxy_pass http://frontend_upstream;
        include /etc/nginx/conf.d/proxy-params.conf;
    }
}
