version: '3.9'

# ============================================================
# BiznesERP Production Stack
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: bizzo_postgres
    restart: always
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - bizzo_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  redis:
    image: redis:7-alpine
    container_name: bizzo_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - bizzo_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 768M

  minio:
    image: minio/minio:latest
    container_name: bizzo_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - bizzo_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend.prod
    container_name: bizzo_backend
    restart: always
    environment:
      NODE_ENV:             production
      PORT:                 4000
      DATABASE_URL:         postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL:            redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET:           ${JWT_SECRET}
      JWT_REFRESH_SECRET:   ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES:   15m
      JWT_REFRESH_EXPIRES:  7d
      ANTHROPIC_API_KEY:    ${ANTHROPIC_API_KEY}
      MINIO_ENDPOINT:       minio
      MINIO_PORT:           9000
      MINIO_ACCESS_KEY:     ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY:     ${MINIO_SECRET_KEY}
      MINIO_BUCKET:         erp-uploads
      FRONTEND_URL:         ${FRONTEND_URL}
      ESKIZ_EMAIL:          ${ESKIZ_EMAIL}
      ESKIZ_PASSWORD:       ${ESKIZ_PASSWORD}
      TELEGRAM_BOT_TOKEN:   ${TELEGRAM_BOT_TOKEN}
      DIDOX_API_KEY:        ${DIDOX_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bizzo_net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_WS_URL:  ${VITE_WS_URL}
    container_name: bizzo_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - bizzo_net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M

  nginx:
    image: nginx:alpine
    container_name: bizzo_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/bizzo.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy-params.conf:/etc/nginx/conf.d/proxy-params.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - bizzo_net

  certbot:
    image: certbot/certbot:latest
    container_name: bizzo_certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  backup:
    image: postgres:16-alpine
    container_name: bizzo_backup
    restart: unless-stopped
    environment:
      PGPASSWORD: ${DB_PASSWORD}
      DB_USER:    ${DB_USER}
      DB_NAME:    ${DB_NAME}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    networks:
      - bizzo_net
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "while true; do sleep 86400; /backup.sh; done"]

networks:
  bizzo_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
