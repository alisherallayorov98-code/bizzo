<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport (mobile uchun muhim) -->
    <meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA meta teglari -->
    <meta name="application-name"                       content="BIZZO" />
    <meta name="apple-mobile-web-app-capable"           content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style"  content="black-translucent" />
    <meta name="apple-mobile-web-app-title"             content="Bizzo" />
    <meta name="mobile-web-app-capable"                 content="yes" />
    <meta name="theme-color"                            content="#3B82F6" />
    <meta name="msapplication-TileColor"                content="#0A0F1E" />

    <!-- SEO -->
    <meta name="description" content="O'zbekiston biznesini boshqarish platformasi — ERP va CRM" />
    <meta name="keywords"    content="ERP, CRM, O'zbekiston, biznes, ombor, xodimlar, savdo" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="BIZZO — ERP Platform" />
    <meta property="og:description" content="O'zbekiston biznesini boshqarish" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <title>BIZZO — O'zbekiston ERP Platformasi</title>
  </head>
  <body>
    <div id="root"></div>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js', { scope: '/' })
            .catch(err => console.error('[SW] Error:', err))
        })
      }
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
