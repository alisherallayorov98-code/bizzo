<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIZZO - Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0A0F1E;
      color: #F9FAFB;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 320px; }
    .logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 900; color: white;
      margin: 0 auto 24px;
    }
    h1 { font-size: 22px; margin-bottom: 12px; }
    p  { font-size: 14px; color: #9CA3AF; margin-bottom: 24px; line-height: 1.6; }
    button {
      background: #3B82F6; color: white;
      border: none; border-radius: 10px;
      padding: 12px 24px; font-size: 14px;
      font-weight: 600; cursor: pointer;
      width: 100%;
    }
    button:hover { background: #2563EB; }
    .status { margin-top: 16px; font-size: 12px; color: #6B7280; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">B</div>
    <h1>Internet aloqasi yo'q</h1>
    <p>BIZZO ga ulanish uchun internet kerak. Aloqani tekshirib, qayta urinib ko'ring.</p>
    <button onclick="window.location.reload()">Qayta urinish</button>
    <p class="status" id="status"></p>
  </div>
  <script>
    window.addEventListener('online', () => {
      document.getElementById('status').textContent = 'Internet tiklandi. Yuklanmoqda...'
      setTimeout(() => window.location.href = '/', 1000)
    })
    window.addEventListener('offline', () => {
      document.getElementById('status').textContent = 'Hali ham offline...'
    })
  </script>
</body>
</html>
